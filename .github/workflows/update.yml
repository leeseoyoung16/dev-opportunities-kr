name: Daily Update

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: "0 0 * * *"
  workflow_dispatch: # 수동 실행 허용 (manual trigger)

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        run: python crawler/main.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: auto update $(date +'%Y-%m-%d %H:%M KST')"
          git push